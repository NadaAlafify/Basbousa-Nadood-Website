<!DOCTYPE html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="UTF-8">
        <title>أسرار مطبخ روعة | 9 وصفات</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    </head>
    <body class="bg-amber-950 font-['Cairo'] text-white">
        <div class="container mx-auto px-6 py-12">
            <a href="index.html" class="text-orange-400 font-bold mb-8 inline-block">← الرجوع للرئيسية</a>
            <h1 class="text-4xl font-black mb-12 text-center text-right">9 أسرار تخليكي ملكة بسبوسة </h1>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-right">
                <script>
                    const recipes = [
                        "سر الترميلة ومقدار السمنة", "طريقة الشربات المظبوط", "بسبوسة العشر دقائق",
                        "القشطة البيتي المتماسكة", "بدائل السكر للدايت", "سر اللون الذهبي الموحد",
                        "بسبوسة بدون فرن (سريعة)", "أسرار تزيين المحلات", "تخزين البسبوسة لفترة طويلة"
                    ];
                    recipes.forEach(r => {
                        document.write(`
                            <div class="bg-white/10 p-8 rounded-3xl border border-white/10 hover:border-orange-500 transition group">
                                <div class="text-4xl mb-4">✨</div>
                                <h3 class="text-xl font-bold mb-6">${r}</h3>
                                <p class="text-orange-200/60 mb-6 text-sm italic">شرح تفصيلي هيخليكي محترفة من أول مرة.</p>
                                <a href="recipe-detail.html" class="block text-center bg-orange-600 text-white py-3 rounded-full font-bold hover:bg-white hover:text-orange-600 transition">شوفي الطريقة كاملة</a>
                            </div>
                        `);
                    });
                 </script>
             </div>
         </div>
     </body>
</html>
